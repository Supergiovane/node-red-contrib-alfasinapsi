<script type="text/html" data-template-name="alfasinapsi-telemetry">
  <div class="form-row">
    <label><i class="fa fa-youtube-play" style="color:#ff0000;"></i> Video</label>
    <a href="https://youtu.be/R-7PZv3iJ2s" target="_blank" rel="noopener noreferrer">Guarda su YouTube</a>
  </div>

  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Nome</label>
    <input type="text" id="node-input-name" placeholder="telemetria">
  </div>
  <div class="form-row">
    <label for="node-input-device"><i class="fa fa-plug"></i> Dispositivo</label>
    <input type="text" id="node-input-device">
  </div>
  <div class="form-row">
    <label for="node-input-pollInterval"><i class="fa fa-clock-o"></i> Poll (ms)</label>
    <input type="number" id="node-input-pollInterval" placeholder="2000">
  </div>
  <div class="form-row">
    <label for="node-input-sendOnChange"><i class="fa fa-filter"></i> Solo se cambia</label>
    <input type="checkbox" id="node-input-sendOnChange" style="width:auto;">
  </div>
  <div class="form-row">
    <label for="node-input-compatibility"><i class="fa fa-puzzle-piece"></i> Compatibilita</label>
    <select id="node-input-compatibility">
      <option value="telemetry">Telemetria</option>
      <option value="knxLoadControlPin">KNX Load Control PIN</option>
    </select>
  </div>
  <div class="form-row" id="alfasinapsi-unshedDelayMin-row">
    <label for="node-input-unshedDelayMin"><i class="fa fa-clock-o"></i> Ritardo unshed (min)</label>
    <input type="number" id="node-input-unshedDelayMin" min="0" placeholder="0">
  </div>
  <div class="form-row" id="alfasinapsi-telemetryPinsMode-row">
    <label for="node-input-telemetryPinsMode"><i class="fa fa-random"></i> PIN Telemetria</label>
    <select id="node-input-telemetryPinsMode">
      <option value="singleTelemetryPin">PIN unico telemetria</option>
      <option value="sixValuePins">6 PIN valori principali</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="alfasinapsi-telemetry">
	  <p><b>Telemetria Sinapsi Alfa</b> legge i dati da Sinapsi Alfa e invia messaggi dalle sue uscite, in base alla compatibilita selezionata.</p>

	  <h3>Video YouTube</h3>
	  <p><a href="https://youtu.be/R-7PZv3iJ2s" target="_blank" rel="noopener noreferrer">Guarda il video: configurazione e utilizzo</a></p>

		  <h3>Importante: frequenza (Poll)</h3>
		  <p>
		    Il campo <b>Poll (ms)</b> decide ogni quanto arrivano i valori: se lo abbassi, avrai aggiornamenti piu frequenti.
		  </p>

	  <h3>Uscite</h3>
	  <ul>
	    <li><b>Compatibilita = Telemetria</b> + <b>PIN unico telemetria</b>: 1 uscita con il messaggio completo (<code>msg.payload</code> + <code>msg.insight</code>) e messaggi di stato connessione.</li>
	    <li><b>Compatibilita = Telemetria</b> + <b>6 PIN valori principali</b>: 6 uscite dedicate ai valori principali:
	      <code>consumptionKW</code>, <code>productionkW</code>, <code>selfConsumption</code>, <code>gridSale</code>, <code>gridPurchase</code>, <code>cutoff.hasWarning</code>.
	    </li>
	    <li><b>Compatibilita = KNX Load Control PIN</b>: 1 uscita con <code>shed</code>/<code>unshed</code>.</li>
	  </ul>
	  <p>In modalita <b>6 PIN valori principali</b>, le uscite numeriche emettono solo se il valore e' numerico; l'uscita <code>cutoff.hasWarning</code> emette solo se booleana.</p>

  <h3>msg.status (stato connessione)</h3>
  <p>I messaggi emessi includono <code>msg.status</code>, con:</p>
  <ul>
    <li><code>status.connected</code> (boolean)</li>
    <li><code>status.connecting</code> (boolean)</li>
    <li><code>status.error</code> (string|null)</li>
    <li><code>status.ts</code> (number, epoch ms)</li>
  </ul>

  <h3>Output: Telemetria</h3>
  <dl class="message-properties">
    <dt>msg.topic <span class="property-type">string</span></dt>
    <dd><code>alfasinapsi/telemetry</code></dd>

	    <dt>msg.payload <span class="property-type">object</span></dt>
	    <dd>Valori semplificati per l'uso quotidiano (potenza/energia/percentuali utili/fascia tariffaria/avviso distacco).</dd>

    <dt>msg.insight <span class="property-type">object</span></dt>
    <dd>Dettagli tecnici (telemetria completa decodificata + meta informazioni).</dd>
  </dl>

			  <h3>msg.payload (semplificato)</h3>
			  <ul>
			    <li>
			      <code>payload.power.importkW</code>, <code>payload.power.exportkW</code>, <code>payload.power.productionkW</code>,
			      <code>payload.power.consumptionKW</code>, <code>payload.power.surplusKW</code>
			    </li>
			    <li><code>payload.utilityPercent</code>: percentuali istantanee (0..100, 1 decimale)</li>
			    <li><code>payload.utilityPercent.selfConsumption</code>: % autoconsumo istantaneo (quanta produzione usi in casa)</li>
			    <li><code>payload.utilityPercent.gridSale</code>: % vendita istantanea al gestore (quanta produzione vendi)</li>
			    <li><code>payload.utilityPercent.gridPurchase</code>: % acquisto istantaneo dal gestore (quanta parte del consumo arriva dalla rete)</li>
			    <li><code>payload.energy.importTotalkWh</code>, <code>payload.energy.exportTotalkWh</code>, <code>payload.energy.productionTotalkWh</code></li>
			    <li><code>payload.tariffBand</code></li>
			    <li><code>payload.cutoff.hasWarning</code>, <code>payload.cutoff.remainingSeconds</code>, <code>payload.cutoff.atIso</code></li>
			    <li><code>payload.messageAtIso</code>, <code>payload.meterReadAtIso</code></li>
			  </ul>

		  <h3>Terminologia</h3>
		  <ul>
		    <li><b>Consumo (casa)</b>: consumo istantaneo totale della casa. In questo pacchetto e' calcolato come <code>import + production - export</code> (campo <code>payload.power.consumptionKW</code>).</li>
		    <li><b>Import</b>: potenza/energia prelevata dalla rete (consumi piu di quanto produci).</li>
		    <li><b>Export</b>: potenza/energia immessa in rete (produci piu di quanto consumi).</li>
		    <li><b>Surplus</b>: potenza in eccesso disponibile. In questo pacchetto coincide con <b>Export</b> (campo <code>payload.power.surplusKW</code>).</li>
		    <li><b>Produzione</b>: potenza/energia prodotta (per esempio da fotovoltaico).</li>
		  </ul>

		  <h3>msg.insight (tecnico)</h3>
		  <ul>
		    <li><code>insight.telemetry</code>: telemetria completa decodificata (include campi extra come fasce di ieri, medie di quarto d'ora, ecc.)</li>
		    <li><code>insight.power</code>: valori comodi in watt (<code>consumptionW</code>, <code>surplusW</code>)</li>
		  </ul>

	  <h3>Output: KNX Load Control PIN</h3>
	  <p>
	    Invia <code>shed</code> se la telemetria segnala un distacco imminente, altrimenti <code>unshed</code>.
	    Se imposti <b>Ritardo unshed (min)</b>, il nodo continua a emettere <code>shed</code> per N minuti dopo l'ultimo warning, e solo dopo torna a <code>unshed</code>.
	    La frequenza dei messaggi dipende da <b>Poll (ms)</b>. Se abiliti <i>Solo se cambia</i>, emette solo quando passa da <code>shed</code> a <code>unshed</code> (o viceversa).
	  </p>
	  <dl class="message-properties">
	    <dt>msg.topic <span class="property-type">string</span></dt>
	    <dd><code>alfasinapsi/telemetry/knx-load-control-pin</code></dd>

    <dt>msg.payload <span class="property-type">string</span></dt>
    <dd><code>shed</code> oppure <code>unshed</code></dd>

    <dt>msg.shedding <span class="property-type">string</span></dt>
    <dd><code>shed</code> oppure <code>unshed</code> (per compatibilita con KNX Load Control)</dd>
  </dl>

	  <h3>Configurazione</h3>
	  <dl class="message-properties">
    <dt>Dispositivo <span class="property-type">alfasinapsi-device</span></dt>
    <dd>Indirizzo IP Sinapsi (impostazioni di comunicazione fisse).</dd>

	    <dt>Poll (ms) <span class="property-type">number</span></dt>
	    <dd>
	      Ogni quanto il nodo legge i dati e (in modalita <code>Telemetria</code>) ogni quanto puo emettere messaggi.
	      Se colleghi l'output a logiche di shedding a stadi, questo valore influenza la velocita della sequenza.
	    </dd>

    <dt>Solo se cambia <span class="property-type">boolean</span></dt>
    <dd>Se abilitato, invia messaggi solo quando cambia il payload.</dd>

	    <dt>Compatibilita <span class="property-type">telemetry | knxLoadControlPin</span></dt>
	    <dd>
	      <ul>
	        <li><code>Telemetria</code>: emette telemetria completa o 6 PIN, in base alla modalita selezionata (rispetta <i>Poll</i> e <i>Solo se cambia</i>).</li>
	        <li><code>KNX Load Control PIN</code>: emette <code>shed</code>/<code>unshed</code> e puo ritardare il ritorno a <code>unshed</code> con <i>Ritardo unshed (min)</i>.</li>
	      </ul>
		      Nota: se colleghi l'output al nodo <code>alfasinapsi-load-controller</code>, un <i>Poll</i> piu basso rende il controller piu reattivo.
		    </dd>
	    <dt>Ritardo unshed (min) <span class="property-type">number</span></dt>
	    <dd>Disponibile solo in <code>KNX Load Control PIN</code>. Mantiene l'output su <code>shed</code> per N minuti dopo l'ultimo warning, utile come anti-flapping. Impostare 0 per comportamento immediato.</dd>
	    <dt>PIN Telemetria <span class="property-type">singleTelemetryPin | sixValuePins</span></dt>
	    <dd>
	      Se <code>singleTelemetryPin</code>, il nodo usa un solo output con tutta la telemetria.
	      Se <code>sixValuePins</code>, il nodo usa 6 output con i valori principali.
	    </dd>
		  </dl>

	</script>

<script type="text/javascript">
  (function () {
    const COMPATIBILITY_TELEMETRY = "telemetry";
    const COMPATIBILITY_KNX_LOAD_CONTROL_PIN = "knxLoadControlPin";
    const TELEMETRY_PINS_MODE_SINGLE = "singleTelemetryPin";
    const TELEMETRY_PINS_MODE_VALUES = "sixValuePins";

    function resolveOutputs(config) {
      const compatibility = config.compatibility || COMPATIBILITY_TELEMETRY;
      if (compatibility === COMPATIBILITY_KNX_LOAD_CONTROL_PIN) return 1;
      const telemetryPinsMode = config.telemetryPinsMode || TELEMETRY_PINS_MODE_SINGLE;
      return telemetryPinsMode === TELEMETRY_PINS_MODE_VALUES ? 6 : 1;
    }

    function resolveOutputLabels(config) {
      const compatibility = config.compatibility || COMPATIBILITY_TELEMETRY;
      if (compatibility === COMPATIBILITY_KNX_LOAD_CONTROL_PIN) return ["KNX Load Control PIN"];
      const telemetryPinsMode = config.telemetryPinsMode || TELEMETRY_PINS_MODE_SINGLE;
      if (telemetryPinsMode !== TELEMETRY_PINS_MODE_VALUES) return ["telemetria"];
      return [
        "Consumo (casa)",
        "Produzione",
        "% autoconsumo istantaneo",
        "% vendita istantanea al gestore",
        "% acquisto istantaneo dal gestore",
        "Avviso distacco"
      ];
    }

    RED.nodes.registerType('alfasinapsi-telemetry', {
      category: 'AlfaSinapsi Ultimate',
      color: '#00BAFF',
	      defaults: {
	        name: { value: "" },
	        device: { value: "", type: "alfasinapsi-device", required: true },
	        pollInterval: { value: 10000, validate: RED.validators.number() },
	        sendOnChange: { value: false },
	        compatibility: { value: "telemetry" },
	        unshedDelayMin: { value: 0 },
	        telemetryPinsMode: { value: "singleTelemetryPin" },
	        outputs: { value: 1 }
	      },
      inputs: 0,
      outputs: 1,
      outputLabels: function (index) {
        const labels = resolveOutputLabels(this);
        return labels[index] || ("output " + (index + 1));
      },
      icon: "font-awesome/fa-bolt",
      label: function () { return this.name || "alfasinapsi telemetria"; },
      onadd: function () {
        const updateOutputs = () => {
          try {
            this.outputs = resolveOutputs(this);
            if (Array.isArray(this.wires)) {
              while (this.wires.length < this.outputs) this.wires.push([]);
            }
          } catch (_) {
            this.outputs = 1;
          }
          try {
            RED.view?.redraw?.();
          } catch (_) {
            // ignore
          }
        };
        if (!this.telemetryPinsMode) {
          this.telemetryPinsMode = Number(this.outputs) >= 6 ? TELEMETRY_PINS_MODE_VALUES : TELEMETRY_PINS_MODE_SINGLE;
        }
        updateOutputs();
        setTimeout(updateOutputs, 0);
      },
      oneditprepare: function () {
        const inferredTelemetryPinsMode = Number(this.outputs) >= 6
          ? TELEMETRY_PINS_MODE_VALUES
          : TELEMETRY_PINS_MODE_SINGLE;
	        const compatibility = this.compatibility || COMPATIBILITY_TELEMETRY;
	        const telemetryPinsMode = this.telemetryPinsMode || inferredTelemetryPinsMode;
	        $("#node-input-compatibility").val(compatibility);
	        $("#node-input-unshedDelayMin").val(this.unshedDelayMin || 0);
	        $("#node-input-telemetryPinsMode").val(telemetryPinsMode);

	        const updateOutputPreview = () => {
	          const nextCompatibility = $("#node-input-compatibility").val() || COMPATIBILITY_TELEMETRY;
	          const nextTelemetryPinsMode = $("#node-input-telemetryPinsMode").val() || TELEMETRY_PINS_MODE_SINGLE;
	          $("#alfasinapsi-unshedDelayMin-row").toggle(nextCompatibility === COMPATIBILITY_KNX_LOAD_CONTROL_PIN);
	          $("#alfasinapsi-telemetryPinsMode-row").toggle(nextCompatibility === COMPATIBILITY_TELEMETRY);
	          this.outputs = resolveOutputs({ compatibility: nextCompatibility, telemetryPinsMode: nextTelemetryPinsMode });
	          try {
            RED.view?.redraw?.();
          } catch (_) {
            // ignore
          }
        };
        $("#node-input-compatibility").on("change", updateOutputPreview);
        $("#node-input-telemetryPinsMode").on("change", updateOutputPreview);
        updateOutputPreview();
      },
	      oneditsave: function () {
	        const compatibility = $("#node-input-compatibility").val() || COMPATIBILITY_TELEMETRY;
	        const telemetryPinsMode = $("#node-input-telemetryPinsMode").val() || TELEMETRY_PINS_MODE_SINGLE;
	        const unshedDelayMin = Number($("#node-input-unshedDelayMin").val()) || 0;
	        this.compatibility = compatibility;
	        this.unshedDelayMin = unshedDelayMin;
	        this.telemetryPinsMode = telemetryPinsMode;
	        this.outputs = resolveOutputs({ compatibility, telemetryPinsMode });
	      }
    });
  })();
</script>
